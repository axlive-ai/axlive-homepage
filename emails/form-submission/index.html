<html>
  <body style="margin:0; padding:0; background:#05070d; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#05070d; padding:32px 0;">
      <tr>
        <td align="center">
          <table width="560" cellpadding="0" cellspacing="0" style="background:#11141f; border:1px solid #262b3a; border-radius:14px; overflow:hidden;">
            <tr>
              <td style="padding:28px 32px 8px 32px;">
                <div style="font-size:13px; letter-spacing:0.2em; color:#7dd3fc; font-weight:700;">AXLIVE</div>
                <h1 style="margin:8px 0 4px 0; font-size:20px; color:#f3f4f6;">새로운 서비스 문의가 도착했습니다</h1>
                <p style="margin:0 0 20px 0; font-size:13px; color:#9ca3af;">axlive.ai.kr 문의 폼을 통해 접수되었습니다.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px;">
                <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
                  <tr>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:13px; color:#9ca3af; width:100px;">이름</td>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:14px; color:#f3f4f6;">{{name}}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:13px; color:#9ca3af;">회사명</td>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:14px; color:#f3f4f6;">{{company}}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:13px; color:#9ca3af;">직책</td>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:14px; color:#f3f4f6;">{{title}}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:13px; color:#9ca3af;">이메일</td>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:14px; color:#f3f4f6;">{{email}}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:13px; color:#9ca3af;">연락처</td>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:14px; color:#f3f4f6;">{{phone}}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:13px; color:#9ca3af;">관심 분야</td>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:14px; color:#f3f4f6;">{{interest}}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:13px; color:#9ca3af;">예상 일정</td>
                    <td style="padding:10px 0; border-top:1px solid #262b3a; font-size:14px; color:#f3f4f6;">{{timeline}}</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 32px 28px 32px;">
                <div style="font-size:13px; color:#9ca3af; margin-bottom:6px; padding-top:10px; border-top:1px solid #262b3a;">문의 내용</div>
                <div style="font-size:14px; color:#f3f4f6; line-height:1.6; background:#05070d; border:1px solid #262b3a; border-radius:10px; padding:14px;">{{message}}</div>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 32px; background:#0b0e17; border-top:1px solid #262b3a;">
                <p style="margin:0; font-size:12px; color:#6b7280;">이 메일은 axlive.ai.kr 문의 폼 제출에 대한 자동 알림입니다.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
